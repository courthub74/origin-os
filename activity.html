<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Origin OS — Activity</title>

  <link rel="icon" type="image/svg+xml" href="/img/favicon/origin-logo.png">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">

  <link rel="stylesheet" href="/css/dreamos.css">
  <link rel="stylesheet" href="/css/activity.css">
</head>

<body>
  <div class="scrim" id="scrim"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <a class="brand" href="dashboard.html">
        <div class="dreamos-logo md">
          <svg width="120" height="138" viewBox="0 0 120 138" xmlns="http://www.w3.org/2000/svg">
            <polygon points="60,2 114,34 114,104 60,136 6,104 6,34" fill="none" stroke="currentColor" stroke-width="2"/>
            <g transform="translate(60 69)">
              <polygon points="0,-28 6,-12 0,-6 -6,-12" fill="currentColor"/>
              <polygon points="28,0 12,6 6,0 12,-6" fill="currentColor"/>
              <polygon points="0,28 -6,12 0,6 6,12" fill="currentColor"/>
              <polygon points="-28,0 -12,-6 -6,0 -12,6" fill="currentColor"/>
            </g>
          </svg>
        </div>
        <div class="brandText"><strong>Origin OS</strong><span>Create. Shape. Release.</span></div>
      </a>

      <nav class="nav">
        <a href="dashboard.html">Dashboard <small>⌘1</small></a>
        <a href="create.html">Create<small>⌘2</small></a>
        <a href="branding.html">Branding <small>⌘3</small></a>
        <a href="collections.html">Collections <small>⌘4</small></a>
        <a href="mint.html">Mint <small>⌘5</small></a>
        <a href="drops.html">Drops <small>⌘6</small></a>
        <a href="socials.html">Socials <small>⌘7</small></a>
        <a href="website.html">Website <small>⌘8</small></a>
      </nav>

      <div class="sidebar-footer account-footer">
        <button class="account-btn" id="accountBtn" type="button" aria-haspopup="menu" aria-expanded="false">
          <div class="account-avatar">
            <img src="../img/blue_user.png" class="user_avatar" alt="User Avatar" />
            <div class="account-meta">
              <p class="account-name"></p>
              <p class="account-role"></p>
            </div>
          </div>
          <small class="account-chev" aria-hidden="true">⌄</small>
        </button>

        <div class="account-menu" id="accountMenu" role="menu" aria-label="Account menu">
          <button class="menu-item" role="menuitem" type="button" data-go="profile.html">Profile Details</button>
          <button class="menu-item" role="menuitem" type="button" data-go="profile_settings.html">Profile Settings</button>
          <button class="menu-item" role="menuitem" type="button" data-go="display_settings.html">Display Settings</button>
          <div class="menu-sep" aria-hidden="true"></div>
          <button class="menu-item danger" role="menuitem" type="button" data-action="logout">Logout</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topLeft">
          <button class="burger" id="burger" aria-label="Open menu" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>

          <div class="crumbs">
            <div class="kicker">Archive</div>
            <div class="title">Activity Timeline</div>
          </div>
        </div>

        <div class="topRight">
          <span class="pill">All Activity</span>
        </div>
      </header>

      <section class="content">
        <div class="activity-layout">

          <section class="panel">
            <div class="head">
              <h2>Filters</h2>
              <span class="pill">Refine</span>
            </div>

            <div class="body">
              <div class="activity-filters">
                <button class="btn filter-btn active" data-filter="all" type="button">All</button>
                <button class="btn filter-btn" data-filter="generated" type="button">Generated</button>
                <button class="btn filter-btn" data-filter="draft" type="button">Drafts</button>
                <button class="btn filter-btn" data-filter="collection" type="button">Collections</button>
                <button class="btn filter-btn" data-filter="publish" type="button">Published</button>
                <button class="btn filter-btn" data-filter="drop" type="button">Drops</button>
                <button class="btn filter-btn" data-filter="social" type="button">Socials</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="head">
              <h2>Monthly Timeline</h2>
              <span class="pill" id="activityCountPill">0 Items</span>
            </div>

            <div class="body">
              <div id="activityTimeline">
                <div class="activity-empty">
                  <div class="activity-empty-title">Loading activity…</div>
                  <div class="activity-empty-sub">Preparing the archive chamber.</div>
                </div>
              </div>
            </div>
          </section>

        </div>
      </section>
    </main>
  </div>

  <script src="/js/dreamos-shell.js"></script>
  <script src="/js/profile-menu.js"></script>
  <script src="/js/auth-guard.js"></script>
  <script src="/js/activity.js"></script>
</body>
</html>
